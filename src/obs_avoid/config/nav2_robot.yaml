docking_server:
  ros__parameters:
    controller_frequency: 50.0
    dock_plugins: ["simple_charging_dock"]  # At least one plugin required
    simple_charging_dock:
      plugin: "opennav_docking::SimpleChargingDock"
      # Add robot-specific params, e.g.:
      # docking_threshold: 0.05
      # staging_x_offset: -0.7
      # use_battery_status: true
      # use_stall_detection: false
    docks: ["home_dock"]  # Define dock instances
    home_dock:
      type: "simple_charging_dock"
      frame: "map"
      pose: [0.0, 0.0, 0.0]  # Initial dock pose

collision_monitor:
  ros__parameters:
    enabled: True
    base_frame_id: "base_footprint"
    odom_frame_id: "odom"
    cmd_vel_in_topic: "cmd_vel_smoothed"
    cmd_vel_out_topic: "cmd_vel"
    transform_tolerance: 0.5
    source_timeout: 5.0
    stop_pub_timeout: 2.0
    enable_stamped_cmd_vel: False # False for Jazzy or older by default
    polygons: ["PolygonStop", "PolygonSlow"]
    PolygonStop:
      type: "polygon"
      points: "[[0.4, 0.3], [0.4, -0.3], [0.0, -0.3], [0.0, 0.3]]"
      action_type: "stop"
      min_points: 4  # max_points: 3 for Humble
      visualize: True
      polygon_pub_topic: "polygon_stop"
    PolygonSlow:
      type: "polygon"
      points: "[[0.6, 0.4], [0.6, -0.4], [0.0, -0.4], [0.0, 0.4]]"
      action_type: "slowdown"
      min_points: 4  # max_points: 3 for Humble
      slowdown_ratio: 0.3
      visualize: True
      polygon_pub_topic: "polygon_slowdown"
    observation_sources: ["scan"]
    scan:
      type: "scan"
      topic: "scan"
      
controller_server:
  ros__parameters:
    use_sim_time: False
    controller_frequency: 20.0
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.5
    failure_tolerance: 0.3
    # Plugin config
    controller_plugins: ["FollowPath"]
    # Trajectory generation for FollowPath (MPPI controller)
    FollowPath:
      plugin: "nav2_mppi_controller::MPPIController"
    # Required trajectory critics for FollowPath
    trajectory_generator_plugins: ["generator"]
    generator:
      plugin: "nav2_mppi_controller::TrajectoryGenerator"
    trajectory_critic_plugins: ["critic_1", "critic_2"]  # Add at least 2 critics
    critic_1:  # PathFollowCritic
      plugin: "nav2_mppi_controller::PathFollowCritic"
    critic_2:  # GoalAlignCritic example
      plugin: "nav2_mppi_controller::GoalAlignCritic"
    # Progress checker
    progress_checker_plugins: ["progress_checker"]
    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
    # Goal checkers
    goal_checker_plugins: ["goal_checker"]
    goal_checker:
      plugin: "nav2_controller::SimpleGoalChecker"

local_costmap:
  local_costmap:
    ros__parameters:
      robot_base_frame: base_link_to_base_laser_ld19
      footprint: "[[0.22, 0.18], [0.22, -0.18], [-0.22, -0.18], [-0.22, 0.18]]"
      plugins: ["obstacle_layer", "inflation_layer"]

      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: True
        observation_sources: scan

        scan:
          topic: /scan
          data_type: "LaserScan"
          marking: True
          clearing: True
          obstacle_max_range: 4.0
          raytrace_max_range: 6.0

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        inflation_radius: 0.25

global_costmap:
  global_costmap:  # Add if missing
    ros__parameters:
      robot_base_frame: base_link_to_base_laser_ld19
      update_frequency: 1.0
      publish_frequency: 1.0
      robot_radius: 0.22  # Match footprint
      resolution: 0.05
      track_unknown_space: true
      plugins: ["obstacle_layer", "inflation_layer"]
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        observation_sources: scan
        scan:
          topic: /scan
          max_obstacle_height: 2.0
          clearing: true
          marking: true
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        inflation_radius: 0.55

